source = ~/Настройки/hyprland/hypr/conf/env.conf
source = ~/Настройки/hyprland/hypr/conf/program_var.conf
source = ~/Настройки/hyprland/hypr/conf/autostart.conf
source = ~/Настройки/hyprland/hypr/conf/general.conf
source = ~/Настройки/hyprland/hypr/conf/window_rule.conf

exec-once=hyprctl output create headless
monitor=HEADLESS-2, 1920x1080@60, 0x-1080, 1


# monitor=DP-2,preferred,0x0,1, transform, 0
# monitor=DVI-I-1,preferred,-1920x0,1

monitor=DP-1,preferred,1920x0,1, transform, 0
monitor=DVI-I-1,preferred,-1920x0,1
monitor=HDMI-A-1,preferred,0x0,1

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

$mainMod = SUPER # Sets "Windows" key as main modifier

#$mainMod = alt #SUPER # Sets "Windows" key as main modifier

source = ~/Настройки/hyprland/hypr/conf/binds.conf

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, exec, ~/.config/hypr/change_workspace.sh 1
bind = $mainMod, 2, exec, ~/.config/hypr/change_workspace.sh 2
bind = $mainMod, 3, exec, ~/.config/hypr/change_workspace.sh 3
bind = $mainMod, 4, exec, ~/.config/hypr/change_workspace.sh 4
bind = $mainMod, 5, exec, ~/.config/hypr/change_workspace.sh 5
bind = $mainMod, 6, exec, ~/.config/hypr/change_workspace.sh 6
bind = $mainMod, 7, exec, ~/.config/hypr/change_workspace.sh 7
bind = $mainMod, 8, exec, ~/.config/hypr/change_workspace.sh 8
bind = $mainMod, 9, exec, ~/.config/hypr/change_workspace.sh 9
bind = $mainMod, 0, exec, ~/.config/hypr/change_workspace.sh 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, exec, ~/.config/hypr/move_to_workspace.sh 1
bind = $mainMod SHIFT, 2, exec, ~/.config/hypr/move_to_workspace.sh 2
bind = $mainMod SHIFT, 3, exec, ~/.config/hypr/move_to_workspace.sh 3
bind = $mainMod SHIFT, 4, exec, ~/.config/hypr/move_to_workspace.sh 4
bind = $mainMod SHIFT, 5, exec, ~/.config/hypr/move_to_workspace.sh 5
bind = $mainMod SHIFT, 6, exec, ~/.config/hypr/move_to_workspace.sh 6
bind = $mainMod SHIFT, 7, exec, ~/.config/hypr/move_to_workspace.sh 7
bind = $mainMod SHIFT, 8, exec, ~/.config/hypr/move_to_workspace.sh 8
bind = $mainMod SHIFT, 9, exec, ~/.config/hypr/move_to_workspace.sh 9
bind = $mainMod SHIFT, 0, exec, ~/.config/hypr/move_to_workspace.sh 10


